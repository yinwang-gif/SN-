<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settlement Network · 原型演示</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: #0e1621; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Top bar ── */
.topbar {
  height: 52px; background: #17212b;
  border-bottom: 1px solid #1e2d3d;
  display: flex; align-items: center;
  padding: 0 24px; gap: 24px; flex-shrink: 0;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 600; color: #fff;
  flex-shrink: 0;
}
.logo-icon {
  width: 28px; height: 28px; background: #1F32D6;
  border-radius: 6px; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 700;
}
.logo-divider { width: 1px; height: 20px; background: #2d3f50; }
.logo-sub { font-size: 13px; font-weight: 500; color: #9ca3af; }

/* ── Tab switcher ── */
.tabs { display: flex; align-items: center; gap: 4px; flex: 1; }

.tab {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px; border-radius: 6px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid transparent;
  color: #9ca3af; transition: all 0.15s;
  white-space: nowrap;
}
.tab:hover { background: #1e2d3d; color: #fff; }
.tab.active { background: #1e2d3d; color: #fff; border-color: #2d3f50; }
.tab .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tab-client .dot { background: #26C165; }
.tab-lp .dot { background: #1F32D6; }
.tab-ops .dot { background: #FA8C16; }
.tab-tg .dot { background: #2196F3; }

.tab-client.active { border-color: #26C165; }
.tab-lp.active { border-color: #1F32D6; }
.tab-ops.active { border-color: #FA8C16; }
.tab-tg.active { border-color: #2196F3; }

/* ── Description badge ── */
.tab-desc {
  margin-left: auto; flex-shrink: 0;
  font-size: 12px; color: #9ca3af;
  background: #1e2d3d; padding: 4px 12px;
  border-radius: 4px; border: 1px solid #2d3f50;
}

/* ── Lang toggle ── */
.lang-toggle-btn {
  flex-shrink: 0;
  font-size: 12px; font-weight: 600;
  color: #9ca3af; background: #1e2d3d;
  border: 1px solid #2d3f50; border-radius: 4px;
  padding: 4px 12px; cursor: pointer;
  font-family: 'Poppins', sans-serif;
  transition: all 0.15s;
}
.lang-toggle-btn:hover { color: #fff; border-color: #4a5f70; }

/* ── iframe container ── */
.frame-wrap { flex: 1; position: relative; overflow: hidden; }
.frame-wrap iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none; display: none;
}
.frame-wrap iframe.active { display: block; }

/* ── Loading state ── */
.loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #0e1621; z-index: 10;
  flex-direction: column; gap: 12px;
}
.loading.hidden { display: none; }
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid #1e2d3d;
  border-top-color: #1F32D6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text { font-size: 13px; color: #9ca3af; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">C</div>
    Cobo
    <div class="logo-divider"></div>
    <span class="logo-sub">Settlement Network 原型演示</span>
  </div>

  <div class="tabs">
    <div class="tab tab-client active" onclick="switchTab('client', this)">
      <span class="dot"></span>
      Client 视角
    </div>
    <div class="tab tab-lp" onclick="switchTab('lp', this)">
      <span class="dot"></span>
      LP 视角
    </div>
    <div class="tab tab-ops" onclick="switchTab('ops', this)">
      <span class="dot"></span>
      Cobo 运营视角
    </div>
    <div class="tab tab-tg" onclick="switchTab('tg', this)">
      <span class="dot"></span>
      TG 询报价流程
    </div>
  </div>

  <div class="tab-desc" id="tab-desc">
    持有法币，需要换成稳定币
  </div>
  <button class="lang-toggle-btn" id="lang-toggle-btn" onclick="toggleLang()">EN</button>
</div>

<div class="frame-wrap">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">加载中...</div>
  </div>

  <iframe id="frame-client" class="active" src="settlement_room_client.html" onload="onFrameLoad()"></iframe>
  <iframe id="frame-lp" src="settlement_room_lp_v2.html" onload="onFrameLoad()"></iframe>
  <iframe id="frame-ops" src="settlement_room_ops.html" onload="onFrameLoad()"></iframe>
  <iframe id="frame-tg" src="SN_产品方案讨论_完整版_6.html" onload="onFrameLoad()"></iframe>
</div>

<script>
const descs = {
  zh: {
    client: '持有法币，需要换成稳定币',
    lp: '提供法币流动性，收取稳定币',
    ops: 'Cobo 内部运营，负责审批和异常处理',
    tg: 'Telegram 询报价卡片流程演示',
  },
  en: {
    client: 'Holds fiat, needs to convert to stablecoin',
    lp: 'Provides fiat liquidity, receives stablecoin',
    ops: 'Cobo internal ops — approvals & exception handling',
    tg: 'Telegram inquiry & quote card flow demo',
  }
};

let loaded = { client: false, lp: false, ops: false, tg: false };
let current = 'client';
let currentLang = localStorage.getItem('sn_lang') || 'zh';

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('sn_lang', lang);
  // Update toggle button label
  document.getElementById('lang-toggle-btn').textContent = lang === 'zh' ? 'EN' : '中';
  // Update current tab description
  document.getElementById('tab-desc').textContent = descs[lang][current];
  // Broadcast to all iframes
  document.querySelectorAll('iframe').forEach(frame => {
    try { frame.contentWindow.postMessage({ type: 'lang', lang: lang }, '*'); } catch(e) {}
  });
}

function toggleLang() {
  applyLang(currentLang === 'zh' ? 'en' : 'zh');
}

function switchTab(name, el) {
  if (current === name) return;
  current = name;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));

  document.getElementById('tab-desc').textContent = descs[currentLang][name];

  if (!loaded[name]) {
    document.getElementById('loading').classList.remove('hidden');
  }

  document.getElementById('frame-' + name).classList.add('active');
}

function onFrameLoad() {
  document.getElementById('loading').classList.add('hidden');
  // Mark all as loaded to avoid showing spinner again
  Object.keys(loaded).forEach(k => loaded[k] = true);
  // Send current lang to newly loaded frame
  document.querySelectorAll('iframe').forEach(frame => {
    try { frame.contentWindow.postMessage({ type: 'lang', lang: currentLang }, '*'); } catch(e) {}
  });
}

// Apply initial lang state
window.addEventListener('load', function() {
  applyLang(currentLang);
});
</script>
</body>
</html>
